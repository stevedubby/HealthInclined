# Fails the job if the production homepage does not return HTTP 200.
# Does not replace external uptime monitoring; catches gross deploy/DNS regressions.
name: Site reachability

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  curl-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: HTTPS apex (follow redirect to www)
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 -L https://healthinclined.com/)
          echo "HTTP $code"
          test "$code" = "200"

      - name: HTTPS www (canonical)
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 https://www.healthinclined.com/)
          echo "HTTP $code"
          test "$code" = "200"

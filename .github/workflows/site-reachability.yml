# Fails the job if the production homepage does not return HTTP 200.
# Does not replace external uptime monitoring; catches gross deploy/DNS regressions.
name: Site reachability

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  curl-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: HTTPS healthinclined.com (apex)
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 https://healthinclined.com/)
          echo "HTTP $code"
          test "$code" = "200"

      # After you add www in DNS + Vercel, uncomment to enforce www → apex:
